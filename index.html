<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Autobahnarchy</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <!-- Title Screen -->
    <div id="screen-title" class="screen active">
      <img src="assets/title-screen-tall.gif" alt="Masha and Bobby's Autobahnarchy" class="title-bg">
      <div class="menu">
        <button class="btn" data-players="1">1 PLAYER</button>
        <button class="btn" data-players="2">2 PLAYERS</button>
        <button id="btn-install" class="btn btn-install hidden">INSTALL APP</button>
      </div>
    </div>

    <!-- Instructions Screen -->
    <div id="screen-instructions" class="screen">
      <div class="interstitial-card">
        <img src="assets/study-time.png" alt="Study Time" class="interstitial-img">
        <p class="interstitial-text">Flip through the rules to study up. When you're ready, hit START QUIZ!</p>
        <button id="btn-instructions-go" class="btn btn-accent">LET'S GO!</button>
      </div>
    </div>

    <!-- Study Screen -->
    <div id="screen-study" class="screen">
      <div class="rule-counter">Rule <span id="rule-current">1</span> of <span id="rule-total">5</span></div>
      <div class="rule-card">
        <img id="rule-image" class="rule-image" src="" alt="">
        <h2 id="rule-title" class="rule-title"></h2>
        <p id="rule-explanation" class="rule-explanation"></p>
      </div>
      <div class="study-buttons">
        <button id="btn-next-rule" class="btn">NEXT RULE</button>
        <button id="btn-start-quiz" class="btn btn-accent">START QUIZ</button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="screen-quiz" class="screen">
      <div class="quiz-header">
        <span id="quiz-player" class="quiz-player">MASHA</span>
        <span id="quiz-progress">Q1/10</span>
      </div>
      <div class="quiz-card">
        <img id="quiz-image" class="quiz-image" src="" alt="">
        <p id="quiz-question" class="quiz-question"></p>
        <div id="quiz-answers" class="quiz-answers"></div>
      </div>
      <button id="btn-submit-answer" class="btn btn-accent" disabled>SUBMIT</button>
      <div id="quiz-feedback" class="quiz-feedback hidden"></div>
    </div>

    <!-- Handoff Screen (2-player only, content swapped per player) -->
    <div id="screen-handoff" class="screen">
      <div class="interstitial-card">
        <img id="handoff-img" src="" alt="" class="interstitial-img">
        <p id="handoff-text" class="interstitial-text"></p>
        <button id="btn-handoff-go" class="btn btn-accent">GO!</button>
      </div>
    </div>

    <!-- Victory Screen (2-player only, content swapped per outcome) -->
    <div id="screen-victory" class="screen">
      <div class="interstitial-card">
        <img id="victory-img" src="" alt="" class="victory-img">
        <h2 id="victory-text" class="victory-text"></h2>
        <button id="btn-victory-summary" class="btn btn-accent">SEE SUMMARY</button>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="screen-results" class="screen">
      <h2 class="results-title">RESULTS</h2>
      <div id="results-content" class="results-content"></div>
      <button id="btn-play-again" class="btn btn-accent">PLAY AGAIN</button>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
